services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: employee-management-backend
    ports:
      - "5265:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - employee-net

  frontend:
    build:
      context: ./employee-management-app
      dockerfile: dockerfile
    container_name: employee-management-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - employee-net

networks:
  employee-net:
    driver: bridge
